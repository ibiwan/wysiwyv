    departments: {
      $and: [
        { $array: "$string" },                  # each element is a string
        ["Bicycles", "Accessories", "Apparel"], # exact tuple
      ],
    },
    locations: [
      { $object: { $partial: { id: { $uuid: 0 } } } },
      { $object: { $partial: { id: { $uuid: 1 } } } },
      { $object: { $partial: { id: { $uuid: 4 } } } },
      { $object: { $partial: { id: { $uuid: 7 } } } },
      { $object: { $partial: { id: { $uuid: "F" } } } },
    ],
  }
  expected: []
- description: BHAG Core, Failures
  candidate: {
    a: "a",
    b: false,
    c: "no",
    d: false,
    e: -1,
    f: "no",
    g: true,
    h: "something",
    i: false,
    j: [-1, -2],
    k: [1, 2],
    l: .nan,
    m: { a: 1, c: 3 },
  }
  template: {
    a: .nan,
    b: "b",
    c: "c",
    d: 4,
    e: 5,
    f: false,
    g: false,
    h: null,
    i: [],
    j: [10],
    k: [1, 2, 3],
    l: {},
    m: { a: 1, b: 2 },
  }
  expected:
    - code: invalid-config
      message: "Unsupported value type in expected object: 'NaN'"
      path: [a]
    - code: incorrect-type
      expected: "string"
      candidate: "false"
      path: [b]
    - code: incorrect-value
      expected: "c"
      candidate: "no"
      path: [c]
    - code: incorrect-type
      expected: "number"
      candidate: "false"
      path: [d]
    - code: incorrect-value
      expected: "5"
      candidate: "-1"
      path: [e]
    - code: incorrect-type
      expected: "boolean"
      candidate: "no"
      path: [f]
    - code: incorrect-value
      expected: "false"
      candidate: "true"
      path: [g]
    - code: incorrect-type
      expected: "null"
      candidate: "something"
      path: [h]
    - code: incorrect-type
      expected: "array"
      candidate: "false"
      path: [i]
    - code: incorrect-attribute
      key: "Array length"
      expected: "1"
      candidate: "2"
      path: [j]
    - code: incorrect-value
      expected: "10"
      candidate: "-1"
      path: [j, 0]
    - code: incorrect-attribute
      key: "Array length"
      expected: "3"
      candidate: "2"
      path: [k]
    - code: missing-element
      key: "index 2"
      expected: "3"
      path: [k, 2]
    - code: incorrect-type
      expected: "object"
      candidate: "NaN"
      path: [l]
    - code: missing-element
      key: "b"
      expected: "2"
      path: [m, b]
    - code: unexpected-element
      key: "c"
      candidate: "3"
      path: [m, c]
- description: BHAG Plugins, Failures
  candidate: {
    a: "a",
    b: "b",
    c: "c",
    d: [1, 2, 3],
    e: [1, 2, 3],
    f: false,
    g: -1,
    h: "emailathostdotdomain",
  }
  template: {
    a: { $and: "not-an-array" },
    b: { $and: ["$string", "$number"] },
    c: "$array",
    d: { $array: { $length: 3, $purple: true } },
    e: { $array: { $length: 4, $minlength: 4, $maxlength: 2 } },
    f: { $and: ["$isodate", "$basicisodate", "$strictisodate"] },
    g: "$email",
    h: "$email",
  }
  expected: 
    - code: invalid-config
      message: "$and value should be an array of templates"
      path: [a]
    - code: incorrect-aggregate
      key: "$and"
      path: [b]
    - code: incorrect-type
      expected: "number"
      candidate: "b"
      path: [b]
    - code: incorrect-type
      expected: "array"
      candidate: "c"
      path: [c]
    - code: invalid-config
      message: "Ignored unknown $array parameters: '$purple'"
      path: [d]
    - code: incorrect-attribute
      key: "$array.$length"
      expected: "4"
      candidate: "3"
      path: [e]
    - code: incorrect-attribute
      key: "$array.$minlength"
      expected: "4"
      candidate: "3"
      path: [e] 
    - code: incorrect-attribute
      key: "$array.$maxlength"
      expected: "2"
      candidate: "3"
      path: [e]
    - code: incorrect-aggregate
      key: "$and"
      path: [f]
    - code: incorrect-type
      expected: "ISO 8601 date"
      candidate: "false"
      path: [f]
    - code: incorrect-type
      expected: "Basic ISO 8601 date"
      candidate: "false"
      path: [f]
    - code: incorrect-type
      expected: "RFC 3339 date"
      candidate: "false"
      path: [f]
    - code: incorrect-type
      expected: "string"
      candidate: "-1"
      path: [g]
    - code: incorrect-type
      expected: "valid email address"
      candidate: "emailathostdotdomain"
      path: [h]
  
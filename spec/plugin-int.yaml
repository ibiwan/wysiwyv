- description: int validates -0
  candidate: { int: -0 }
  template: { int: "$int" }
  expected: []
- description: int validates 10
  candidate: { int: 10 }
  template: { int: "$int" }
  expected: []
- description: int validates -10
  candidate: { int: -10 }
  template: { int: "$int" }
  expected: []
- description: int validates 1
  candidate: { int: 1 }
  template: { int: "$int" }
  expected: []
- description: int validates -1
  candidate: { int: -1 }
  template: { int: "$int" }
  expected: []
- description: int validates MAX_SAFE_INTEGER
  candidate: { int: 9007199254740991 }
  template: { int: "$int" }

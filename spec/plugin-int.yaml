# $int predicates ($min, $max)
- description: "int 0 >= 0"
  candidate: { int: 0 }
  template: { int: { $int: { $min: 0 } } }
  expected: []
- description: "int -1 >= 0 fails"
  candidate: { int: -1 }
  template: { int: { $int: { $min: 0 } } }
  expected:
    - code: incorrect-attribute
      key: "$int.$min"
      expected: "≥0"
      candidate: "-1"
      path: [int]
- description: "int 1 >= 0"
  candidate: { int: 1 }
  template: { int: { $int: { $min: 0 } } }
  expected: []
- description: "int 0 <= 0"
  candidate: { int: 0 }
  template: { int: { $int: { $max: 0 } } }
  expected: []
- description: "int -1 <= 0"
  candidate: { int: -1 }
  template: { int: { $int: { $max: 0 } } }
  expected: []
- description: "int 1 <= 0 fails"
  candidate: { int: 1 }
  template: { int: { $int: { $max: 0 } } }
  expected:
    - code: incorrect-attribute
      key: "$int.$max"
      expected: "≤0"
      candidate: "1"
      path: [int]
- description: "int 0 in range [-1, 1]"
  candidate: { int: 0 }
  template: { int: { $int: { $min: -1, $max: 1 } } }
  expected: []
- description: "int -2 below range [-1, 1]"
  candidate: { int: -2 }
  template: { int: { $int: { $min: -1, $max: 1 } } }
  expected:
    - code: incorrect-attribute
      key: "$int.$min"
      expected: "≥-1"
      candidate: "-2"
      path: [int]
- description: "int 2 above range [-1, 1]"
  candidate: { int: 2 }
  template: { int: { $int: { $min: -1, $max: 1 } } }
  expected:
    - code: incorrect-attribute
      key: "$int.$max"
      expected: "≤1"
      candidate: "2"
      path: [int]
- description: "int 0 fails both min and max when inverted"
  candidate: { int: 0 }
  template: { int: { $int: { $min: 1, $max: -1 } } }
  expected:
    - code: incorrect-attribute
      key: "$int.$min"
      expected: "≥1"
      candidate: "0"
      path: [int]
    - code: incorrect-attribute
      key: "$int.$max"
      expected: "≤-1"
      candidate: "0"
      path: [int]

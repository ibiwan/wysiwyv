# Invalid integers (YAML-native types)
- description: int rejects MIN_VALUE (fractional)
  candidate: { int: 5e-324 }
  template: { int: "$int" }
  expected:
    - code: incorrect-type
      expected: integer
      candidate: "5e-324"
      path: [int]
- description: int rejects EPSILON
  candidate: { int: 2.220446049250313e-16 }
  template: { int: "$int" }
  expected:
    - code: incorrect-type

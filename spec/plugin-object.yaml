# $object configuration validation
- description: validates entire value of an object, allow extra keys
  template: { obj: { $object: { $partial: { a: b, c: d } } } }
  candidate: { obj: { a: b, c: d, e: f } }
  expected: []
- description: validates expected $partial is reasonable
  template: { obj: { $object: { $partial: not an object } } }
  candidate: { obj: { a: b, c: d, e: f } }
  expected:
    - code: invalid-config
      message: "$object.$partial option should be an object"
      path: [obj]
- description: rejects non-plain object for $partial
  candidate: { obj: __MAP__ }
  template: { obj: { $object: { $partial: {} } } }
  expected:
    - code: incorrect-type
      expected: "plainobject for $partial"
      candidate: __MAP__
      path: [obj]
- description: rejects non-plain object for $eachElement
  candidate: { obj: __MAP__ }
  template: { obj: { $object: { $eachElement: {} } } }
  expected:
    - code: incorrect-type
      expected: "plainobject for $eachElement"
      candidate: __MAP__
      path: [obj]
- description: validates no unexpected config
  template: { obj: { $object: { $reverseObject: no idea, $arrayLength: 2 } } }
  candidate: { obj: { a: b, c: d, e: f } }
  expected:
    - code: invalid-config
      message: "Unexpected $object parameters: $reverseObject,$arrayLength"
      path: [obj]
- description: validates no conflicting config
  template: { obj: { $object: { $partial: no idea, $eachElement: 2 } } }
  candidate: { obj: { a: b, c: d, e: f } }
  expected:
    - code: invalid-config
      message: "$object options can specify $partial or $eachElement but not both"
      path: [obj]
- description: validates partial value of an object, rejects missing keys
  template: { obj: { $object: { $partial: { a: b, c: d } } } }
  candidate: { obj: { a: b } }
  expected:
    - code: missing-element
      key: c
      expected: d
      path: [obj, c]
- description: checks each value of an object, string
  template: { obj: { $object: { $eachElement: "$string" } } }
  candidate: { obj: { a: b, c: d, e: f } }
  expected: []
- description: checks each value of an object, string, rejects
  template: { obj: { $object: { $eachElement: "$string" } } }
  candidate: { obj: { a: b, c: 3, e: f } }
  expected:
    - code: incorrect-type
      expected: string
      candidate: "3"
      path: [obj, c]
- description: checks each value of an object, nested
  template: { obj: { $object: { $eachElement: { $array: { $length: 2 } } } } }
  candidate: { obj: { a: [1, 2], b: [a, b], q: [true, false] } }
  expected: []
- description: checks each value of an object, nested, rejects
  template: { obj: { $object: { $eachElement: { $array: { $length: 2 } } } } }
  candidate: { obj: { a: [1, 2], b: abcdef, q: [true, false] } }
  expected:
    - code: incorrect-type
      expected: array
      candidate: abcdef
      path: [obj, b]

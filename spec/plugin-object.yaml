# $plainobject type discrimination
- description: plainobject accepts empty object
  candidate: { obj: {} }
  template: { obj: "$plainobject" }
  expected: []
- description: plainobject accepts simple object
  candidate: { obj: { a: b } }
  template: { obj: "$plainobject" }
  expected: []
- description: plainobject accepts null-prototype object
  candidate: { obj: __NULL_PROTO__ }
  template: { obj: "$plainobject" }
  expected: []
- description: plainobject rejects null
  candidate: { obj: null }
  template: { obj: "$plainobject" }
  expected:
    - code: incorrect-type
      expected: plainobject
      candidate: "null"
      path: [obj]
- description: plainobject rejects array
  candidate: { obj: [] }
  template: { obj: "$plainobject" }
  expected:
    - code: incorrect-type
      expected: plainobject
      candidate: "[]"
      path: [obj]
- description: plainobject rejects date
  candidate: { obj: __DATE__ }
  template: { obj: "$plainobject" }
  expected:
    - code: incorrect-type
      expected: plainobject
      candidate: __DATE__
      path: [obj]
- description: plainobject rejects regex
  candidate: { obj: __REGEX__ }
  template: { obj: "$plainobject" }
  expected:
    - code: incorrect-type
      expected: plainobject
      candidate: __REGEX__
      path: [obj]
- description: plainobject rejects boxed string
  candidate: { obj: __BOXED_STRING__ }
  template: { obj: "$plainobject" }
  expected:
    - code: incorrect-type
      expected: plainobject
      candidate: __BOXED_STRING__
      path: [obj]
- description: plainobject rejects map
  candidate: { obj: __MAP__ }
  template: { obj: "$plainobject" }
  expected:
    - code: incorrect-type
      expected: plainobject
      candidate: __MAP__
      path: [obj]
- description: plainobject rejects set
  candidate: { obj: __SET__ }
  template: { obj: "$plainobject" }
  expected:
    - code: incorrect-type
      expected: plainobject
      candidate: __SET__
      path: [obj]
- description: plainobject rejects class
  candidate: { obj: __CLASS__ }
  template: { obj: "$plainobject" }
  expected:
    - code: incorrect-type
      expected: plainobject
      candidate: __CLASS__
      path: [obj]
- description: plainobject rejects anonymous function
  candidate: { obj: __ANON_FN__ }
  template: { obj: "$plainobject" }
  expected:
    - code: incorrect-type
      expected: plainobject
      candidate: __ANON_FN__
      path: [obj]


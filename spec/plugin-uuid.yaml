# Invalid UUIDs
- description: invalid UUID format
  candidate: { id: invalid-uuid }
  template: { id: "$uuid" }
  expected:
    - code: incorrect-type
      expected: UUID
      candidate: invalid-uuid
      path: [id]
- description: invalid UUID version number
  candidate: { id: "6ba7b810-9dad-11d1-80b4-00c04fd430c8" }
  template: { id: { $uuid: 40 } }
  expected:
    - code: invalid-config
      message: "Unknown UUID version: '40'"
      path: [id]
- description: non-string UUID candidate
  candidate: { id: 1241245 }
  template: { id: "$uuid" }
  expected:
    - code: incorrect-type
      expected: string
      candidate: "1241245"
      path: [id]
- description: UUID version mismatch
  candidate: { id: "6ba7b810-9dad-11d1-80b4-00c04fd430c8" }
  template: { id: { $uuid: "F" } }
  expected:
    - code: incorrect-type
      expected: "UUID of version 'F'"
      candidate: "6ba7b810-9dad-11d1-80b4-00c04fd430c8"
      path: [id]

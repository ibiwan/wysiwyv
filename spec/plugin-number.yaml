# Invalid numbers (YAML-native types)
- description: number rejects string
  candidate: { num: a }
  template: { num: "$number" }
  expected:
    - code: incorrect-type
      expected: number
      candidate: a
      path: [num]
- description: number rejects boolean
  candidate: { num: true }
  template: { num: "$number" }
  expected:
    - code: incorrect-type

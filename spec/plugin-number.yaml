# $number predicates ($min, $max, $lt, $gt)
- description: "number 0 >= 0"
  candidate: { num: 0 }
  template: { num: { $number: { $min: 0 } } }
  expected: []
- description: "number -1 >= 0 fails"
  candidate: { num: -1 }
  template: { num: { $number: { $min: 0 } } }
  expected:
    - code: incorrect-attribute
      key: "$number.$min"
      expected: "≥0"
      candidate: "-1"
      path: [num]
- description: "number 1 >= 0"
  candidate: { num: 1 }
  template: { num: { $number: { $min: 0 } } }
  expected: []
- description: "number 0 <= 0"
  candidate: { num: 0 }
  template: { num: { $number: { $max: 0 } } }
  expected: []
- description: "number -1 <= 0"
  candidate: { num: -1 }
  template: { num: { $number: { $max: 0 } } }
  expected: []
- description: "number 1 <= 0 fails"
  candidate: { num: 1 }
  template: { num: { $number: { $max: 0 } } }
  expected:
    - code: incorrect-attribute
      key: "$number.$max"
      expected: "≤0"
      candidate: "1"
      path: [num]
- description: "number 0 in range [-1, 1]"
  candidate: { num: 0 }
  template: { num: { $number: { $min: -1, $max: 1 } } }
  expected: []
- description: "number -2 below range [-1, 1]"
  candidate: { num: -2 }
  template: { num: { $number: { $min: -1, $max: 1 } } }
  expected:
    - code: incorrect-attribute
      key: "$number.$min"
      expected: "≥-1"
      candidate: "-2"
      path: [num]
- description: "number 2 above range [-1, 1]"
  candidate: { num: 2 }
  template: { num: { $number: { $min: -1, $max: 1 } } }
  expected:
    - code: incorrect-attribute
      key: "$number.$max"
      expected: "≤1"
      candidate: "2"
      path: [num]
- description: "number 0 fails both min and max when inverted"
  candidate: { num: 0 }
  template: { num: { $number: { $min: 1, $max: -1 } } }
  expected:
    - code: incorrect-attribute
      key: "$number.$min"
      expected: "≥1"
      candidate: "0"
      path: [num]
    - code: incorrect-attribute
      key: "$number.$max"
      expected: "≤-1"
      candidate: "0"
      path: [num]
- description: "number 0 < 0 fails"
  candidate: { num: 0 }
  template: { num: { $number: { $lt: 0 } } }
  expected:
    - code: incorrect-attribute
      key: "$number.$lt"
      expected: "<0"
      candidate: "0"
      path: [num]
- description: "number 0 < epsilon succeeds"
  candidate: { num: 0 }
  template: { num: { $number: { $lt: 2.220446049250313e-16 } } }
  expected: []
- description: "number 0 > 0 fails"
  candidate: { num: 0 }
  template: { num: { $number: { $gt: 0 } } }
  expected:
    - code: incorrect-attribute
      key: "$number.$gt"
      expected: ">0"
      candidate: "0"
      path: [num]
- description: "number 0 > -epsilon succeeds"
  candidate: { num: 0 }
  template: { num: { $number: { $gt: -2.220446049250313e-16 } } }
  expected: []

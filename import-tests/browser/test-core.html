<!DOCTYPE html>
<html>
<head><title>wysiwyv browser test — core</title></head>
<body>
<script type="module">
import { makeWysiwyv } from "https://cdn.jsdelivr.net/npm/wysiwyv/dist/wysiwyv-core.min.js";

const results = [];

try {
  const wyv = makeWysiwyv({ plugins: [] });

  const pass = wyv.validate({ name: "hello" }, { name: "hello" });
  results.push({
    test: "core — literal match passes",
    ok: pass.success === true,
  });

  const fail = wyv.validate({ id: "$int" }, { id: "not a number" });
  results.push({
    test: "core — $int treated as literal (no plugins)",
    ok: fail.success === false && fail.errors.length > 0,
  });
} catch (e) {
  results.push({ test: "core — import and init", ok: false, error: e.message });
}

window.__TEST_RESULTS__ = results;
</script>
</body>
</html>
